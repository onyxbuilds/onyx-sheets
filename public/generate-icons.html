<!DOCTYPE html>
<html>
<head><title>Onyx Icon Generator</title></head>
<body style="background:#000;display:flex;flex-direction:column;align-items:center;padding:20px;gap:20px">

<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>

<button onclick="download('c192','pwa-192x192.png')" 
  style="padding:12px 24px;background:#4f46e5;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">
  Download 192x192
</button>

<button onclick="download('c512','pwa-512x512.png')"
  style="padding:12px 24px;background:#4f46e5;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">
  Download 512x512
</button>

<script>
function drawIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId)
  const ctx = canvas.getContext('2d')
  const r = size * 0.22

  // Background
  const grad = ctx.createLinearGradient(0, 0, size, size)
  grad.addColorStop(0, '#312e81')
  grad.addColorStop(1, '#1e1b4b')
  ctx.fillStyle = grad

  // Rounded rectangle
  ctx.beginPath()
  ctx.moveTo(r, 0)
  ctx.lineTo(size - r, 0)
  ctx.quadraticCurveTo(size, 0, size, r)
  ctx.lineTo(size, size - r)
  ctx.quadraticCurveTo(size, size, size - r, size)
  ctx.lineTo(r, size)
  ctx.quadraticCurveTo(0, size, 0, size - r)
  ctx.lineTo(0, r)
  ctx.quadraticCurveTo(0, 0, r, 0)
  ctx.closePath()
  ctx.fill()

  // Hexagon shape
  const cx = size / 2
  const cy = size / 2
  const hr = size * 0.32
  ctx.beginPath()
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i - 30)
    const x = cx + hr * Math.cos(angle)
    const y = cy + hr * Math.sin(angle)
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
  }
  ctx.closePath()
  ctx.strokeStyle = '#818cf8'
  ctx.lineWidth = size * 0.04
  ctx.stroke()

  // Inner O letter
  ctx.font = `bold ${size * 0.38}px -apple-system, sans-serif`
  ctx.fillStyle = '#ffffff'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('O', cx, cy + size * 0.02)
}

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId)
  const link = document.createElement('a')
  link.download = filename
  link.href = canvas.toDataURL('image/png')
  link.click()
}

drawIcon('c192', 192)
drawIcon('c512', 512)
</script>
</body>
</html>
